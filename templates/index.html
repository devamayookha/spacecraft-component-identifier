<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacecraft Component Identifier & Classifier</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #0ea5e9;
            --accent-hover: #38bdf8;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-bg: #0c4a6e;
            --success-text: #38bdf8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
            line-height: 1.5;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 720px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
        }

        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .file-input-wrapper {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        input[type="file"] {
            width: 100%;
            background: #0f172a;
            border: 1px dashed var(--border-color);
            padding: 1.5rem;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="file"]:hover {
            border-color: var(--accent);
        }

        button {
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--accent);
            font-weight: 500;
            font-size: 0.95rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .results-section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-section h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .mission-badge {
            display: inline-block;
            background-color: var(--success-bg);
            color: var(--success-text);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 1.25rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .meta-text {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .component-list {
            list-style: none;
            padding: 0;
            margin: 1.5rem 0 0 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .component-item {
            background: #0f172a;
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            border-radius: 12px;
            position: relative;
        }

        .component-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .component-name {
            font-weight: 700;
            color: var(--text-main);
            text-transform: capitalize;
            font-size: 1.05rem;
        }

        .confidence {
            font-size: 0.825rem;
            font-weight: 600;
            background: var(--border-color);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .component-desc {
            font-size: 0.925rem;
            color: var(--text-muted);
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Spacecraft Classifier</h1>
        <p>Analyze telemetry images to extract subsystems and infer operational profiles.</p>
    </header>

    <div class="card">
        <form id="uploadForm" class="upload-section">
            <div class="file-input-wrapper">
                <input type="file" id="imageInput" name="spacecraft_image" accept="image/*" required>
            </div>
            <button type="submit">Analyze Spacecraft</button>
        </form>
        <div id="loadingText" class="loading">Processing visual telemetry stream... Please wait.</div>
    </div>

    <div id="resultsCard" class="card results-section">
        <h2>Mission Inference</h2>
        <div id="missionType" class="mission-badge"></div>
        <p style="margin: 0;"><strong>Reasoning:</strong> <span id="missionReasoning"></span></p>
        <div id="confidenceNote" class="meta-text"></div>
        
        <h3 style="margin-top: 2.5rem; margin-bottom: 0; font-size: 1.25rem;">Identified Engineering Subsystems</h3>
        <ul id="componentList" class="component-list"></ul>
    </div>
</div>

<script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const fileInput = document.getElementById('imageInput');
        const loadingText = document.getElementById('loadingText');
        const resultsCard = document.getElementById('resultsCard');
        const componentList = document.getElementById('componentList');

        if (!fileInput.files[0]) return;

        const formData = new FormData();
        formData.append('spacecraft_image', fileInput.files[0]);

        loadingText.style.display = 'block';
        resultsCard.style.display = 'none';
        componentList.innerHTML = '';

        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            if (data.status === 'Success') {
                document.getElementById('missionType').innerText = data.mission_inference.mission_type;
                document.getElementById('missionReasoning').innerText = data.mission_inference.reasoning;
                document.getElementById('confidenceNote').innerText = data.mission_inference.confidence_note;

                const detections = data.detected_components;
                const explanations = data.mission_inference.component_explanations;

                if (Object.keys(detections).length === 0) {
                    componentList.innerHTML = `<li class="component-item" style="color: var(--text-muted); text-align: center;">No engineering subsystems met the detection threshold.</li>`;
                } else {
                    for (const [rawName, confidence] of Object.entries(detections)) {
                        let genericName = rawName.replace("a ", "").replace("or propulsion nozzles", "").replace("or optical sensor", "").trim();

                        // Skip printing the background noise row to keep the UI clean
                        if (genericName === "background noise") continue;
                        
                        // Clean strings using JavaScript standard .trim() method
                        let genericName = rawName
                            .replace("a ", "")
                            .replace("or propulsion nozzles", "")
                            .replace("or optical sensor", "")
                            .trim();

                        const explanation = explanations[genericName] || "Focuses on providing core mission support capabilities.";

                        const li = document.createElement('li');
                        li.className = 'component-item';
                        li.innerHTML = `
                            <div class="component-header">
                                <div class="component-name">${genericName}</div>
                                <span class="confidence">${confidence}% Match</span>
                            </div>
                            <p class="component-desc">${explanation}</p>
                        `;
                        componentList.appendChild(li);
                    }
                }

                resultsCard.style.display = 'block';
            } else {
                componentList.innerHTML = `<li class="component-item" style="border-color: #ef4444; color: #f87171;"><strong>Error:</strong> ${data.error}</li>`;
                resultsCard.style.display = 'block';
            }
        } catch (error) {
            componentList.innerHTML = `<li class="component-item" style="border-color: #ef4444; color: #f87171;"><strong>System Failure:</strong> Could not connect to local AI backend. Ensure app.py is running.</li>`;
            resultsCard.style.display = 'block';
            console.error(error);
        } finally {
            loadingText.style.display = 'none';
        }
    });
</script>

</body>
</html>
